name: Fetch and Store File (Commit to Repo)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to download'
        required: true
        type: string
      filename:
        description: 'Output filename (e.g., myapp.apk)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sanitize filename
        run: |
          SAFE_FILENAME=$(echo "${{ github.event.inputs.filename }}" | sed 's/[<>:"|?*]/_/g')
          echo "SAFE_FILENAME=$SAFE_FILENAME" >> $GITHUB_ENV

      - name: Create downloads folder
        run: mkdir -p downloads

      - name: Download file
        run: |
          cd downloads
          wget --timeout=300 --tries=5 \
            --no-check-certificate \
            -O "${{ env.SAFE_FILENAME }}" \
            "${{ github.event.inputs.url }}"
          
          # Show file info (like BIN +XX MB)
          ls -lh "${{ env.SAFE_FILENAME }}"

      - name: Verify download
        run: |
          FILE="downloads/${{ env.SAFE_FILENAME }}"
          if [ ! -f "$FILE" ]; then
            echo "Error: Download failed"
            exit 1
          fi
          if [ ! -s "$FILE" ]; then
            echo "Error: File is empty"
            exit 1
          fi
          SIZE=$(stat -c%s "$FILE")
          echo "✅ Downloaded: ${{ env.SAFE_FILENAME }} ($SIZE bytes)"

      - name: Commit and push to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add downloads/
          git commit -m "Add ${{ env.SAFE_FILENAME }} from URL" || echo "No changes"
          git push
