name: Fetch and Store File (Commit to Repo)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to download'
        required: true
        type: string
      filename:
        description: 'Output filename'
        required: false
        type: string
        default: 'downloaded_file'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanitize filename (remove invalid characters)
        run: |
          SAFE_FILENAME=$(echo "${{ github.event.inputs.filename }}" | sed 's/[<>:"|?*]/_/g')
          echo "SAFE_FILENAME=$SAFE_FILENAME" >> $GITHUB_ENV

      - name: Create downloads folder
        run: mkdir -p downloads

      - name: Download file
        run: |
          cd downloads
          wget --timeout=300 --tries=5 \
            --no-check-certificate \
            -O "${{ env.SAFE_FILENAME }}" \
            "${{ github.event.inputs.url }}"
          
          # Show file size (like BIN +10.6 MB in your screenshot)
          ls -lh "${{ env.SAFE_FILENAME }}"

      - name: Verify download
        run: |
          if [ ! -f "downloads/${{ env.SAFE_FILENAME }}" ]; then
            echo "Error: Download failed"
            exit 1
          fi
          SIZE=$(stat -c%s "downloads/${{ env.SAFE_FILENAME }}")
          echo "Download successful! Size: $SIZE bytes"

      - name: Commit and push to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add downloads/
          git commit -m "Add ${{ env.SAFE_FILENAME }} from URL: ${{ github.event.inputs.url }}" || echo "No changes to commit"
          git push
